<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Web - Emergency Numbers</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; display: flex; min-height: 100vh; }
        /* Sidebar */
        .sidebar { width: 260px; background: #1e293b; color: #fff; padding: 1.5rem 1rem; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; }
        .sidebar a { display: block; color: #cbd5e1; text-decoration: none; padding: 0.7rem 1rem; border-radius: 8px; margin-bottom: 0.4rem; cursor: pointer; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #334155; color: #fff; }
        .sidebar .btn-export, .sidebar .btn-import { background: #2563eb; color: #fff; text-align: center; margin-top: 1rem; }
        .sidebar .btn-export:hover, .sidebar .btn-import:hover { background: #1d4ed8; }
        /* Main Content */
        .main { margin-left: 260px; flex: 1; padding: 2rem; }
        .main h2 { margin-bottom: 1rem; }
        .search-box { width: 100%; max-width: 400px; padding: 0.6rem 1rem; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 1.5rem; }
        .card { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .card-header strong { font-size: 1.1rem; }
        .number-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        .number-item label { font-size: 0.8rem; color: #64748b; display: block; margin-bottom: 0.2rem; }
        .number-item input { width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 6px; }
        .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        button { background: #2563eb; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        button.delete { background: #dc2626; }
        button.save { background: #16a34a; }
        /* Add Form */
        .add-form { background: #fff; border-radius: 12px; padding: 1.5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .add-form label { font-size: 0.85rem; color: #334155; margin-bottom: 0.2rem; display: block; }
        .add-form input { width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 6px; }
        .add-form button { grid-column: 1 / -1; margin-top: 0.5rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🛡️ Admin Panel</h2>
        <a class="active" data-section="list" onclick="switchSection('list')">📋 နိုင်ငံစာရင်း</a>
        <a data-section="add" onclick="switchSection('add')">➕ နိုင်ငံသစ်ထည့်ရန်</a>
        <hr style="border-color:#334155; margin:1rem 0;">
        <a class="btn-export" onclick="exportJSON()">📥 Export JSON</a>
        <a class="btn-import" onclick="document.getElementById('importFile').click()">📤 Import JSON</a>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>

    <div class="main">
        <!-- List Section -->
        <div id="sectionList">
            <h2>🌍 အရေးပေါ်နံပါတ်များ (နိုင်ငံအလိုက်)</h2>
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 နိုင်ငံအမည် (သို့) ကုဒ်ရှာရန်..." oninput="renderCountryList()">
            <div id="countryContainer"></div>
        </div>

        <!-- Add Section -->
        <div id="sectionAdd" class="hidden">
            <h2>နိုင်ငံသစ်ထည့်သွင်းခြင်း</h2>
            <div class="add-form" id="addForm">
                <div><label>Country Code (ISO2)*</label><input type="text" id="addCode" placeholder="MM" maxlength="2"></div>
                <div><label>English Name*</label><input type="text" id="addNameEn" placeholder="Myanmar"></div>
                <div><label>မြန်မာအမည်</label><input type="text" id="addNameMm" placeholder="မြန်မာ"></div>
                <div><label>Police</label><input type="text" id="addPolice"></div>
                <div><label>Ambulance</label><input type="text" id="addAmbulance"></div>
                <div><label>Fire</label><input type="text" id="addFire"></div>
                <div><label>General</label><input type="text" id="addGeneral"></div>
                <button onclick="addCountry()">ထည့်သွင်းမည်</button>
            </div>
        </div>
    </div>

        { code: "GB", name_en: "United Kingdom", name_mm: "ယူကေ", police: "999", ambulance: "999", fire: "999", general: "112" },
        { code: "US", name_en: "United States", name_mm: "အမေရိကန်", police: "911", ambulance: "911", fire: "911", general: "911" },
        { code: "VN", name_en: "Vietnam", name_mm: "ဗီယက်နမ်", police: "113", ambulance: "115", fire: "114", general: "" },
        { code: "YE", name_en: "Yemen", name_mm: "ယီမင်", police: "194", ambulance: "191", fire: "191", general: "" }
    ];

    // localStorage ထဲက ဒေတာ (မရှိရင် default)
    let emergencyData = JSON.parse(localStorage.getItem('emergencyAdminData')) || defaultData;

    function saveToStorage() {
        localStorage.setItem('emergencyAdminData', JSON.stringify(emergencyData));
    }

    // ========== Render Countries ==========
    function renderCountryList() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filtered = emergencyData.filter(c =>
            c.name_en.toLowerCase().includes(search) ||
            c.name_mm.toLowerCase().includes(search) ||
            c.code.toLowerCase().includes(search)
        );

        const container = document.getElementById('countryContainer');
        if (filtered.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:2rem;">နိုင်ငံမတွေ့ပါ</p>';
            return;
        }

        container.innerHTML = filtered.map((c, idx) => {
            const realIndex = emergencyData.indexOf(c);
            return `
            <div class="card" id="card-${realIndex}">
                <div class="card-header">
                    <strong>${c.name_en} (${c.code}) <span style="color:#64748b; font-weight:400;">- ${c.name_mm}</span></strong>
                    <button class="delete" onclick="deleteCountry(${realIndex})">🗑️ ဖျက်မည်</button>
                </div>
                <div class="number-grid">
                    <div class="number-item">
                        <label>Police</label>
                        <input type="text" id="pol-${realIndex}" value="${c.police || ''}">
                    </div>
                    <div class="number-item">
                        <label>Ambulance</label>
                        <input type="text" id="amb-${realIndex}" value="${c.ambulance || ''}">
                    </div>
                    <div class="number-item">
                        <label>Fire</label>
                        <input type="text" id="fir-${realIndex}" value="${c.fire || ''}">
                    </div>
                    <div class="number-item">
                        <label>General</label>
                        <input type="text" id="gen-${realIndex}" value="${c.general || ''}">
                    </div>
                </div>
                <div class="actions">
                    <button class="save" onclick="saveCountry(${realIndex})">💾 ပြင်ဆင်ချက်သိမ်းမည်</button>
                </div>
            </div>`;
        }).join('');
    }

    function saveCountry(index) {
        const c = emergencyData[index];
        c.police = document.getElementById(`pol-${index}`).value.trim();
        c.ambulance = document.getElementById(`amb-${index}`).value.trim();
        c.fire = document.getElementById(`fir-${index}`).value.trim();
        c.general = document.getElementById(`gen-${index}`).value.trim();
        saveToStorage();
        alert('သိမ်းဆည်းပြီးပါပြီ');
    }

    function deleteCountry(index) {
        if (confirm('ဤနိုင်ငံကို ဖျက်မှာ သေချာပါသလား?')) {
            emergencyData.splice(index, 1);
            saveToStorage();
            renderCountryList();
        }
    }

    function addCountry() {
        const code = document.getElementById('addCode').value.trim().toUpperCase();
        const nameEn = document.getElementById('addNameEn').value.trim();
        const nameMm = document.getElementById('addNameMm').value.trim();
        if (!code || !nameEn) {
            alert('Country code နှင့် English name ဖြည့်ရန်လိုအပ်ပါသည်');
            return;
        }
        if (emergencyData.some(c => c.code === code)) {
            alert('ဤကုဒ်သည် ရှိပြီးသားဖြစ်ပါသည်');
            return;
        }
        emergencyData.push({
            code,
            name_en: nameEn,
            name_mm: nameMm || nameEn,
            police: document.getElementById('addPolice').value.trim(),
            ambulance: document.getElementById('addAmbulance').value.trim(),
            fire: document.getElementById('addFire').value.trim(),
            general: document.getElementById('addGeneral').value.trim()
        });
        saveToStorage();
        alert('နိုင်ငံအသစ် ထည့်သွင်းပြီးပါပြီ');
        // Clear form
        ['addCode','addNameEn','addNameMm','addPolice','addAmbulance','addFire','addGeneral'].forEach(id => document.getElementById(id).value = '');
        renderCountryList();
    }

    // ========== Section Switching ==========
    function switchSection(section) {
        document.getElementById('sectionList').classList.add('hidden');
        document.getElementById('sectionAdd').classList.add('hidden');
        if (section === 'list') {
            document.getElementById('sectionList').classList.remove('hidden');
            renderCountryList();
        } else if (section === 'add') {
            document.getElementById('sectionAdd').classList.remove('hidden');
        }
        document.querySelectorAll('.sidebar a[data-section]').forEach(a => a.classList.remove('active'));
        document.querySelector(`.sidebar a[data-section="${section}"]`).classList.add('active');
    }

    // ========== Export / Import ==========
    function exportJSON() {
        const dataStr = JSON.stringify(emergencyData, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'emergency_data.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (!Array.isArray(imported)) throw new Error('Invalid format');
                emergencyData = imported;
                saveToStorage();
                alert('ဒေတာ အောင်မြင်စွာ ထည့်သွင်းပြီးပါပြီ');
                renderCountryList();
            } catch (err) {
                alert('ဖိုင်ဖတ်၍မရပါ - JSON array ဖြစ်ရန်လိုအပ်ပါသည်');
            }
        };
        reader.readAsText(file);
        event.target.value = ''; // reset
    }

    // Initial render
    renderCountryList();
</script>
</body>
</html>
